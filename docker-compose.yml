services:
  app:
    image: osigie4488/erecall:${APP_VERSION}
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/erecall
      SPRING_DATASOURCE_USERNAME: erecall
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_AI_VECTORSTORE_QDRANT_HOST: qdrant
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    networks:
      - erecall-network

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: erecall
      POSTGRES_USER: erecall
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U erecall" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - erecall-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - erecall-network
    restart: unless-stopped

volumes:
  postgres-data:
  qdrant-data:

networks:
  erecall-network:
    driver: bridge